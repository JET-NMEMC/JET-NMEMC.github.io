<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="utf-8">
  <title>WebGIS 等值线图渲染系统</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="contourmap/webgis.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="contourmap/Leaflet.CartoGraticule.css" />
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
  <link rel="stylesheet" href="contourmap/L.Control.Locate.min.css" />

  <style>
    body { margin: 0; overflow: hidden; background: #333; }
    .toolbar-icon { position: fixed; bottom: 10px; z-index: 1000; cursor: pointer; }
    #showtools, #ShowDiv { z-index: 1000; }
  </style>

  <!-- Third-party libraries -->
  <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.6.0.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
  <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.js"></script>
  <script src="contourmap/jszip.min.js"></script>
  <script src="contourmap/GeoShape.js"></script>
  <script src="contourmap/gcoord.js"></script>
  <script src="contourmap/L.KML.js"></script>
  <script src="contourmap/Tokml.js"></script>
  <script src="contourmap/leaflet.latlng-graticule.js"></script>
  <script src="contourmap/Leaflet.CartoGraticule.js"></script>
  <script src="contourmap/L.Control.Locate.min.js"></script>
</head>

<body>
  <div><canvas id="mycanvas" style="display:none;"></canvas></div>
  <div id="map" class="map"></div>

  <!-- Export buttons -->
  <button onclick="exportShp(map,'shp')" style="position:fixed; left:5px; bottom:60px; z-index:1000;">shp</button>
  <button onclick="exportShp(map,'kml')" style="position:fixed; left:45px; bottom:60px; z-index:1000;">kml</button>
  <button onclick="exportShp(map,'json')" style="position:fixed; left:85px; bottom:60px; z-index:1000;">json</button>

  <!-- Toolbar: drawing tools toggle -->
  <img src="contourmap/icon/3-绘制.png" width="38" onclick="showHide('showtools')"
    class="toolbar-icon" style="left:47px;" alt="绘图工具">

  <!-- Vector import (hidden inputs, visible buttons) -->
  <input type="file" id="kmlFileInput" accept=".kml" style="display:none;" />
  <input type="file" id="jsonFileInput" accept=".json,.geojson" style="display:none;" />
  <button onclick="$('#kmlFileInput').click()"
    style="position:fixed; left:100px; bottom:10px; z-index:1000; width:auto; padding:2px 6px; font-size:12px;">KML</button>
  <button onclick="$('#jsonFileInput').click()"
    style="position:fixed; left:145px; bottom:10px; z-index:1000; width:auto; padding:2px 6px; font-size:12px;">JSON</button>

  <!-- Drawing tools panel -->
  <div id="showtools" style="display:none;">
    <div id="showtoolsTitle" class="title">
      坐标绘图<button onclick="showHide('showtools')" class="closebutn">X</button>
    </div>
    <p>名称: <input type="text" id="NewlayerName" value="New" style="width:312px;"></p>
    <p>颜色：<input type="color" id="edgecolor" value="#2D9900">
      字色：<input type="color" id="textcolor" value="#0019FD">
      字号：<input type="text" id="textheight" value="15" style="width:70px; height:20px;">
    </p>
    <div>
      <div style="float:left;">
        <textarea id="textarea" cols="38" rows="20" style="resize:none;">name  lng    lat&#10;大连市 121.561 38.875&#10;青岛市 120.427 36.093&#10;威海市 122.112 37.422</textarea>
      </div>
      <div><button onclick="draw_CircleMarker()" style="height:30px;">圆标记</button></div>
      <div><button onclick="draw_Site()" style="height:30px;">点标记</button></div>
      <div><button onclick="draw_Site_Text()" style="height:30px;">点标注</button></div>
      <div><button onclick="draw_Polyline_in_Map()" style="height:30px;">多段线</button></div>
      <div><button onclick="draw_Polygon_in_Map()" style="height:30px;">多边形</button></div>
      <br>
      <div><button onclick="draw_Site_in_Canvas()" style="height:30px;">画布点</button></div>
    </div>
  </div>

  <div id="ShowDiv" name="ShowDiv"></div>

  <!-- Application modules -->
  <script src="js/wgis.js"></script>
  <script src="js/kriging.js"></script>
  <script src="js/map.js"></script>
  <script src="js/Leaflet.Contour.js"></script>
  <script src="js/contour.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/exporter.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
